<!DOCTYPE html>
<html>

<head>
  <title>CSS Positioning Exercise</title>
  <style>
    
    /* Escreva seu CSS dentro da tag Style! */

    .blue-box{
      background-color: blue;
      width: 500px;
      height: 300px;
      position: relative;
      left: 200px;
      top: 200px;
    }

    .red-circle{
      background-color: red;
      width: 200px;
      height: 200px;
      border-radius: 50%;
      position: absolute;
      left: 250px;
      top: 150px;
    }

    .white-box {
        background-color: rgb(170, 170, 170);
        width: 1000px;
        height: 1000px;
        
    }
    
  </style>
</head>

<body>
    <div class="white-box">
    <div class="blue-box">
    <div class="red-circle">
    </div>
    </div>
    </div>

</body>

</html>
