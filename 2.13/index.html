<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <meta charset="UTF-8">
  <title>CSS Flag Project</title>
  <style>
    /* Escreva seu CSS Aqui */
    .flag {
        background-color: #ce1126;
        width: 900px;
        height: 600px;
        position: relative;

    }

    .flag > p {
        color: white;
        text-align: center;
        margin: 0;
        font-size: 5rem;
    }

    .flag > div {
        width: 900px;
        height: 300px;
        position: absolute;
        top: 150px;
        background-color: #002868;
        font-size: 4rem;
    }

    .flag > div > div {
        border-radius: 50%;
        color: black;
        background-color: white;
        width: 200px;
        height: 200px;
        position: relative;
        left: 300px;
        margin: 1cm;
        display: block;
    }

  </style>
</head>

<body>
  <div class="flag">
    <p>The Flag</p>
    <div>
      <div>
        <p>of Laos</p>
      </div>
    </div>
  </div>
</body>

</html>
